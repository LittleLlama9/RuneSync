name: Build Data Bundle

# Fetches build, counter, and matchup data from u.gg's static JSON API
# and uploads data_bundle.json as a GitHub Release asset. No browser needed.

on:
  schedule:
    - cron: "0 8 * * *"   # daily at 08:00 UTC (~early morning NA)
  workflow_dispatch:        # also allow manual trigger from the Actions tab

permissions:
  contents: write          # needed to upload to the "data-bundle" release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25     # HTTP-only with rate limiting, ~12-18 min

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build data bundle
        run: |
          mkdir -p artifacts
          python scripts/build_data_bundle.py \
            --output artifacts/data_bundle.json

      - name: Validate bundle completeness
        run: |
          ls -lh artifacts/data_bundle.json
          python -c "
          import json, sys
          d = json.load(open('artifacts/data_bundle.json'))
          builds = d.get('builds', {})
          total = len(builds)
          with_data = sum(1 for v in builds.values() if v)
          empty = total - with_data
          pct = with_data / total * 100 if total else 0
          print(f'patch: {d.get(\"patch\")}  champs: {total}  with_data: {with_data}  empty: {empty}  coverage: {pct:.0f}%')
          print(f'failures: {len(d.get(\"failures\", []))}')
          if pct < 90:
              print(f'FAIL: only {pct:.0f}% coverage (need 90%+). Bundle likely rate-limited.')
              sys.exit(1)
          "

      - name: Upload bundle as Release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-bundle
          name: "Data Bundle (auto-updated)"
          body: |
            Auto-generated from u.gg stats API, refreshed daily.
            The RuneSync client downloads `data_bundle.json` from this
            release on startup.
          files: artifacts/data_bundle.json
          prerelease: false
          make_latest: false
          overwrite_files: true
